# Lume kiosk hotkeys (triggerhappy)
#
# Format:
#   <event name>   <event value>   <command line>
#
# Notes:
# - value 1 = key press
# - include both left/right alt variants (different keyboards map differently)

KEY_F4+KEY_LEFTALT  1  /usr/local/bin/lume-quit-kiosk
KEY_F4+KEY_RIGHTALT 1  /usr/local/bin/lume-quit-kiosk
