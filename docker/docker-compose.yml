services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lume}
      POSTGRES_USER: ${POSTGRES_USER:-lume}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-63275f2d4}
    volumes:
      - db_data:/var/lib/postgresql/data
    # Raspberry Pi-friendly defaults.
    # Keep shared memory available for Postgres, but avoid huge defaults.
    shm_size: 256mb
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "effective_cache_size=256MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lume} -d ${POSTGRES_DB:-lume}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  core:
    image: ${CORE_IMAGE:-lumeplayer/lume:core}
    environment:
      RAILS_ENV: ${RAILS_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-lume}:${POSTGRES_PASSWORD:-63275f2d4}@db:5432/${POSTGRES_DB:-lume}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:-6d37aa360ff905944eebff9053cc401e}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-e077bde63275f2d4d6e947e57b74d061df92c0d20e7d64736cdd3e7d8ee50}

      BRANDING: ${BRANDING:-LUME}
      BRANDING_SHORT: ${BRANDING_SHORT:-LUME}

      # Run Solid Queue (workers + scheduler + recurring) inside the Puma process.
      # This avoids needing a separate jobs container on the Pi.
      SOLID_QUEUE_IN_PUMA: "1"

      # Optional integrations
      EXTERNAL_UI_USERNAME: ${EXTERNAL_UI_USERNAME:-}
      EXTERNAL_UI_PASSWORD: ${EXTERNAL_UI_PASSWORD:-}
      EXTERNAL_UI_COMPONENT_ID: ${EXTERNAL_UI_COMPONENT_ID:-}
      DWD_MOSMIX_STATION_ID: ${DWD_MOSMIX_STATION_ID:-10548}

      # Selenium is provided as a sidecar container in this compose file.
      # The Rails scraper always connects to the `selenium` service directly.

      # CORS for browser-based frontend/player apps.
      CORS_ENABLED: true
      # With the reverse-proxy in front, everything is served from one origin.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://lume-player.local,https://lume-player.local}

      # ActionCable websocket origins (used by the player refresh channel)
      ACTION_CABLE_ALLOWED_ORIGINS: ${ACTION_CABLE_ALLOWED_ORIGINS:-http://lume-player.local,https://lume-player.local}
    depends_on:
      db:
        condition: service_healthy
      selenium:
        condition: service_started
    volumes:
      - core_storage:/rails/storage
    healthcheck:
      test: ["CMD-SHELL", "ruby -e \"require 'net/http'; exit(Net::HTTP.get_response(URI('http://localhost:3000/up')).is_a?(Net::HTTPSuccess) ? 0 : 1)\"" ]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  selenium:
    image: selenium/standalone-chromium:143.0
    restart: unless-stopped
    ports:
      - "7900:7900" # noVNC (view/control browser)

  frontend:
    image: ${FRONTEND_IMAGE:-lumeplayer/lume:frontend}
    depends_on:
      core:
        condition: service_healthy
    environment:
      # Runtime-config (generated into /runtime-config.js by the image entrypoint)
      #
      # Frontend derives URLs from `window.location.origin` behind the proxy.
      BRANDING: ${BRANDING}
      BRANDING_SHORT: ${BRANDING_SHORT}
    healthcheck:
      # Use 127.0.0.1 instead of localhost because nginx inside the container
      # may not listen on IPv6 ::1, which would make `localhost` fail.
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  player:
    image: ${PLAYER_IMAGE:-lumeplayer/lume:player}
    depends_on:
      core:
        condition: service_healthy
    environment:
      # Runtime-config (generated into /runtime-config.js by the image entrypoint)
      #
      # Player derives URLs from `window.location.origin` behind the proxy.
      NUXT_PUBLIC_PLAYER_ID: ${NUXT_PUBLIC_PLAYER_ID:-}
      NUXT_PUBLIC_HEARTBEAT_INTERVAL_MINUTES: ${NUXT_PUBLIC_HEARTBEAT_INTERVAL_MINUTES:-10}
      NUXT_PUBLIC_DEBUG: ${NUXT_PUBLIC_DEBUG:-}
      
      BRANDING: ${BRANDING}
      BRANDING_SHORT: ${BRANDING_SHORT}
    healthcheck:
      # Use 127.0.0.1 instead of localhost because nginx inside the container
      # may not listen on IPv6 ::1, which would make `localhost` fail.
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      core:
        condition: service_healthy
      frontend:
        condition: service_started
      player:
        condition: service_started
    ports:
      # Allow overriding published ports for local development / conflicts.
      - "${LUME_HTTP_PORT:-80}:80"
      - "${LUME_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  db_data:
  core_storage:
