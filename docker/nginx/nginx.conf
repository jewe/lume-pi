# Nginx reverse-proxy for Raspberry Pi: serve core (Rails), frontend (Nuxt), and player (Nuxt)
# from the same origin.
#
# Paths:
#   /          -> core (Rails)        [default]
#   /control/  -> frontend (Nuxt)     [strip prefix]
#   /playr/    -> player (Nuxt)       [strip prefix]
#
# TLS:
#   Mount a self-signed cert at:
#     /etc/nginx/certs/lume-player.local.crt
#     /etc/nginx/certs/lume-player.local.key
#
# Notes:
# - Websockets for ActionCable are proxied at /cable
# - This file intentionally keeps configuration explicit and Pi-friendly.

# Map upgrade headers for websockets.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# Upstreams (container DNS names).
upstream core_upstream {
  server core:3000;
}

upstream frontend_upstream {
  server frontend:80;
}

upstream player_upstream {
  server player:80;
}

# HTTP -> HTTPS redirect
server {
  listen 80;
  listen [::]:80;

  server_name _;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;

  server_name _;

  ssl_certificate     /etc/nginx/certs/lume-player.local.crt;
  ssl_certificate_key /etc/nginx/certs/lume-player.local.key;

  # Reasonable defaults for a self-signed local deployment.
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 50m;

  # --- Frontend (/control/) ---
  location ^~ /control/ {
    # Strip /control prefix so frontend can stay built for "/".
    rewrite ^/control/(.*)$ /$1 break;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    proxy_pass http://frontend_upstream;
  }

  # --- Player (/playr/) ---
  location ^~ /playr/ {
    # Strip /playr prefix so player can stay built for "/".
    rewrite ^/playr/(.*)$ /$1 break;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    proxy_pass http://player_upstream;
  }

  # --- ActionCable (websocket) ---
  location = /cable {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_pass http://core_upstream;
  }

  # --- Core (Rails) ---
  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    proxy_pass http://core_upstream;
  }
}