## Local dev reverse-proxy (HTTP only)
#
# This is intentionally separate from nginx.conf (Pi) so local development
# doesn't require TLS certificates.
#
# Paths:
#   /          -> core (Rails)
#   /control/  -> frontend (Nuxt) [strip prefix]
#   /playr/    -> player (Nuxt)   [strip prefix]

events {}

http {
  # Map upgrade headers for websockets.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
  }

  upstream core_upstream {
    server core:3000;
  }

  upstream frontend_upstream {
    server frontend:80;
  }

  upstream player_upstream {
    server player:80;
  }

  server {
    listen 80;
    listen [::]:80;

    server_name _;

    client_max_body_size 50m;

    # --- Frontend (/control/) ---
    location ^~ /control/ {
      rewrite ^/control/(.*)$ /$1 break;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;

      proxy_pass http://frontend_upstream;
    }

    # --- Player (/playr/) ---
    location ^~ /playr/ {
      rewrite ^/playr/(.*)$ /$1 break;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;

      proxy_pass http://player_upstream;
    }

    # --- ActionCable (websocket) ---
    location = /cable {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_pass http://core_upstream;
    }

    # --- Core (Rails) ---
    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;

      proxy_pass http://core_upstream;
    }
  }
}